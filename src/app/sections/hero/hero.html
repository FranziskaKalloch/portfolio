<section class="hero content-limit">
  <div class="hero__inner">
    <!-- LEFT -->
    <div class="hero__image-side">
      <img class="hero__image-background" src="./assets/hero-section/shape-default.png" />
      <img class="hero__image-overlay" src="./assets/img/franzy.png" />
    </div>

    <!-- HERO RIGHT -->
    <div class="hero__content-side">
      <!-- TOP SECTION -->

      <div class="hero__top">
        <div class="hero__logo">
          <div class="hero__logo-icon-wrapper">
            <img class="hero__logo-icon" src="./assets/icons/logo-light2.png" />
          </div>

          <div class="hero__logo-text">
            <div class="hero__text-name">F.Kalloch</div>
            <div class="hero__text-developer color-blue">developer</div>
          </div>
        </div>

        <div class="hero__social">
          <button class="hero__social-button" aria-label="GitHub">
            <svg
              class="hero__social-svg"
              width="30"
              height="30"
              viewBox="0 0 30 30"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path fill-rule="evenodd" clip-rule="evenodd" d="..." fill="#89BCD9" />
            </svg>
          </button>

          <button class="hero__social-button" aria-label="Email">
            <svg class="hero__social-svg" width="30" height="30" viewBox="0 0 30 30" fill="none">
              <circle cx="15" cy="15" r="14.5" stroke="currentColor" />
              <rect
                x="5"
                y="8"
                width="20"
                height="14"
                rx="1"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M6 9L15 15L24 9"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <button class="hero__social-button" aria-label="LinkedIn">
            <svg
              class="hero__social-svg"
              width="30"
              height="30"
              viewBox="0 0 30 30"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M15 0.5C23.0239 0.5 29.5 6.97614 29.5 15C29.5 23.0239 23.0239 29.5 15 29.5C6.97614 29.5 0.5 23.0239 0.5 15C0.5 6.97614 6.97614 0.5 15 0.5ZM5.7002 22.0996H10.4004V9.59961H5.7002V22.0996ZM20.4961 9.26953C19.4862 9.09782 18.4287 9.21766 17.5166 9.57324C17.0765 9.74483 16.6616 9.97549 16.2998 10.2617V9.59961H11.5996V22.0996H16.2002V15.5C16.2002 14.0464 17.1089 13.3645 17.917 13.3369C18.3306 13.3228 18.7389 13.4749 19.0479 13.8037C19.3562 14.132 19.5996 14.6751 19.5996 15.5V22.0996H24.4004V14.2998C24.4004 12.7745 23.956 11.596 23.2227 10.752C22.4923 9.91147 21.5089 9.44178 20.4961 9.26953ZM8 4.5C7.46001 4.5 6.85724 4.7571 6.40039 5.09961L6.34277 5.14258L6.2998 5.2002C5.96701 5.64397 5.70025 6.14847 5.7002 6.7998C5.7002 7.42887 5.94872 8.03185 6.2998 8.5L6.32129 8.52832L6.34668 8.55371C6.75129 8.9582 7.38364 9.2002 8 9.2002C8.55843 9.2002 9.24162 8.99041 9.58691 8.42871C10.0772 8.01247 10.2998 7.38776 10.2998 6.7998C10.2998 6.14847 10.033 5.64397 9.7002 5.2002L9.67871 5.17188L9.65332 5.14648L9.56738 5.06738C9.35957 4.88892 9.10173 4.7569 8.86035 4.66797C8.58159 4.56528 8.27227 4.5 8 4.5Z"

              />
            </svg>
          </button>
        </div>
      </div>

      <!-- HEADLINE SECTION -->

      <div class="hero__headline">
        <h1 class="hero__name">Franziska Kalloch</h1>
        <h2 class="hero__job-title">FULLSTACK DEVELOPER</h2>
      </div>

      <!-- BUTTON  -->

      <div class="hero__button">
        <img
          class="hero__scroll-button hero__button-default"
          src="./assets/icons/Arrow-down-default.png"
        />
        <img
          class="hero__scroll-button hero__button-hover"
          src="./assets/icons/Arrow-down-hover.png"
        />
      </div>
    </div>
  </div>
</section>
