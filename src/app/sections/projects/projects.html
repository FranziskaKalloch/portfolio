<section class="app-projects" id="projects">
  <div class="project__inner content-limit">
    <div class="headline-div">
      <h2 class="color-blue headline">My Projects</h2>
    </div>

    <div class="projects__tabs">
      <div
        class="projects__tabs-headline"
        id="pokedex"
        (click)="changeProject(0)"
        [class.active-tab]="activeProject === 0"
      >
        <h3>1. Pokedex</h3>
      </div>
      <div
        class="projects__tabs-headline"
        id="pollo"
        (click)="changeProject(1)"
        [class.active-tab]="activeProject === 1"
      >
        <h3>2. El Pollo Loco</h3>
      </div>
      <div
        class="projects__tabs-headline"
        id="join"
        (click)="changeProject(2)"
        [class.active-tab]="activeProject === 2"
      >
        <h3>3. Join</h3>
      </div>
      <div
        class="projects__tabs-headline"
        id="unknown"
        (click)="changeProject(3)"
        [class.active-tab]="activeProject === 3"
      >
        <h3>4. Ongoing Project</h3>
      </div>
    </div>
  </div>
  <app-project-details [project]="projects[activeProject]"></app-project-details>
</section>

<!-- [project]="projects[activeProject] -->
<!--
activeProject = 0
projects[0]
-> ist dann das Objekt vom Pokedex
----
Das wird dann an den Input "project" übergeben
Projektdetails erhält das komplette Pokedex-Objekt

Hey ProjectDetails, dein Input "project" bekommt projects[activeProject]
-->
