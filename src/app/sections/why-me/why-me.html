<section class="content-limit app-why-me" id="why-me">
  <div class="why-me__inner">
    <h2 class="why-me__headline color-blue headline">{{ 'whyMe.headline' | translate }}</h2>
    <div class="why-me">
      <div class="why-me__located">
        <img class="why_me__located-icon" src="./assets/icons/group-location.png" />
        <p>
          <span class="color-blue">{{ 'whyMe.locatedPrefix' | translate }}</span>
          {{ 'whyMe.locatedText' | translate }}..<span class="span">|</span>
        </p>
      </div>
      <div class="why-me__description">
        <div class="why-me__description-text">
          <p>{{ 'whyMe.aboutHeadline' | translate }}</p>
          <p>
            {{ 'whyMe.aboutText' | translate }}
          </p>
        </div>
        <div class="why-me-button">
          <button class="button button--primary button-default">
            {{ 'whyMe.button' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
